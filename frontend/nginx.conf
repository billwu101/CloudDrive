server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Reverse-proxy the API to the backend so the browser only ever talks to
    # this origin. Keeps deployment host-agnostic (no API URL baked into the
    # build) and sidesteps CORS entirely.
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Allow large uploads (matches backend MAX_UPLOAD_SIZE_BYTES default).
        client_max_body_size 110m;
        proxy_read_timeout 300s;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
