services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-cloud_drive}
      POSTGRES_USER: ${POSTGRES_USER:-cloud_drive}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-cloud_drive_dev}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-cloud_drive} -d ${POSTGRES_DB:-cloud_drive}"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    profiles: ["cache"]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data

  backend:
    build:
      context: ./backend
    environment:
      APP_ENV: development
      CORS_ORIGINS: ${CORS_ORIGINS:-["http://localhost:5173","http://127.0.0.1:5173","http://localhost:8088","http://127.0.0.1:8088"]}
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-cloud_drive}:${POSTGRES_PASSWORD:-cloud_drive_dev}@postgres:5432/${POSTGRES_DB:-cloud_drive}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-development-only-change-me}
      LOCAL_STORAGE_PATH: /app/storage
      REDIS_URL: redis://redis:6379/0
      LLM_PROVIDER: ${LLM_PROVIDER:-ollama}
      LLM_BASE_URL: ${LLM_BASE_URL:-http://192.168.10.75:11434}
      LLM_API_KEY: ${LLM_API_KEY:-ollama-local}
      ASSISTANT_MODEL: ${ASSISTANT_MODEL:-gemma4:26b}
      LLM_NUM_CTX: ${LLM_NUM_CTX:-65536}
      LLM_TIMEOUT_SECONDS: ${LLM_TIMEOUT_SECONDS:-300}
      LLM_KEEP_ALIVE: ${LLM_KEEP_ALIVE:-15m}
      # Time Machine in-process scheduler — safe here (single uvicorn worker).
      SNAPSHOT_SCHEDULER_ENABLED: ${SNAPSHOT_SCHEDULER_ENABLED:-true}
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - storage_data:/app/storage

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8000/api/v1}
    ports:
      - "${FRONTEND_PORT:-5173}:80"
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data:
  storage_data:
