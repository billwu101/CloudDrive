id: gen-m5-04
name: 'M5 multi-step + references #4 (search→recent→get_info→star_item)'
prompt: 幫我搜尋檔案、看最近檔案、查那個項目的詳情、把某個項目加星號
mode:
- api
tags:
- workflow-reuse
- generated
- m5
expect:
  workflow:
    requires_confirmation: true
    steps_include:
    - search
    - recent
    - get_info
    - star_item
mock_llm:
  responses:
  - reply: 多步驟計畫,請確認。
    steps:
    - skill: search
      arguments:
        q: report
    - skill: recent
      arguments: {}
    - skill: get_info
      arguments:
        item_id:
          from_step: 0
          path: items.0.id
    - skill: star_item
      arguments:
        item_id:
          from_step: 0
          path: items.0.id
        starred: true
scoring:
  weights:
    correctness: 1.0
  pass_threshold: 1.0
