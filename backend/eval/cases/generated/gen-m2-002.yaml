id: gen-m2-002
name: M2 清理空間：發票（storage_quota+list_items+search+recent+get_info）
rationale: 清理空間需要五個視角：先看用量了解為何快滿（storage_quota）→ 盤點根目錄分佈（list_items）→ 定位佔空間的特定主題檔（search）→ 辨識最近還在用、不該刪的檔（recent）→
  確認候選檔的實際大小再決定（get_info）。
prompt: 我的雲端空間快滿了，幫我先看目前容量用了多少、列出根目錄有哪些檔案、搜尋跟「發票」有關的大型檔案、看看我最近還在用哪些檔（這些先留著），最後把其中一個檔的詳細大小列出來，我想清理空間。
mode:
- api
- browser
tags:
- read-only
- generated
- m2
- scenario:cleanup_space
expect:
  workflow:
    requires_confirmation: false
    steps_include:
    - storage_quota
    - list_items
    - search
    - recent
    - get_info
scoring:
  weights:
    correctness: 1.0
  pass_threshold: 1.0
  min_pass_rate: 0.6
mock_llm:
  responses:
  - reply: 好的，我幫你查。
    steps:
    - skill: storage_quota
      arguments: {}
    - skill: list_items
      arguments: {}
    - skill: search
      arguments:
        q: 發票
    - skill: recent
      arguments: {}
    - skill: get_info
      arguments:
        item_id: 11111111-1111-1111-1111-111111111111
