id: gen-m5-25
name: 'M5 multi-step + references #25 (search→recent→get_info→create_folder)'
prompt: 幫我搜尋檔案、看最近檔案、查那個項目的詳情、建立一個資料夾
mode:
- api
tags:
- workflow-reuse
- generated
- m5
expect:
  workflow:
    requires_confirmation: true
    steps_include:
    - search
    - recent
    - get_info
    - create_folder
mock_llm:
  responses:
  - reply: 多步驟計畫,請確認。
    steps:
    - skill: search
      arguments:
        q: report
    - skill: recent
      arguments: {}
    - skill: get_info
      arguments:
        item_id:
          from_step: 0
          path: items.0.id
    - skill: create_folder
      arguments:
        name: Archive
scoring:
  weights:
    correctness: 1.0
  pass_threshold: 1.0
