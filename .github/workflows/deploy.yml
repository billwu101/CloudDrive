name: Deploy production

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "要部署的完整 Git commit SHA（40 字元）"
        required: true
        type: string

permissions:
  contents: read
  packages: read

concurrency:
  group: cloud-drive-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to Ubuntu
    runs-on:
      - self-hosted
      - linux
      - x64
      - production
    timeout-minutes: 20
    # GitHub 方案支援 Private Repository Environment 時可啟用人工核准
    # environment: production
    env:
      IMAGE_TAG: ${{ inputs.image_tag }}
    steps:
      - name: Validate image tag
        shell: bash
        run: |
          if [[ ! "${IMAGE_TAG}" =~ ^[0-9a-f]{40}$ ]]; then
            echo "image_tag 必須是完整 40 字元 Git commit SHA。"
            exit 1
          fi
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Deploy
        shell: bash
        run: |
          sudo /usr/local/sbin/deploy-cloud-drive "${IMAGE_TAG}"
